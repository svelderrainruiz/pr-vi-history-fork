name: PR VI History

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number in this repository
        required: true
        type: string
      max_pairs:
        description: Maximum commit pairs per VI (0 = all)
        required: false
        default: '6'
        type: string
      compare_modes:
        description: Optional comma/semicolon/newline separated mode list
        required: false
        default: ''
        type: string
      include_merge_parents:
        description: Include merge-parent lineage while walking history
        required: false
        default: false
        type: boolean
      windows_image:
        description: NI windows container image used for compare lane
        required: false
        default: nationalinstruments/labview:2026q1-windows
        type: string
      linux_image:
        description: NI linux container image used for smoke lane
        required: false
        default: nationalinstruments/labview:latest-linux
        type: string
      windows_runner:
        description: Hosted runner label for windows compare lane
        required: false
        default: windows-2022
        type: string
      linux_runner:
        description: Hosted runner label for linux smoke lane
        required: false
        default: ubuntu-latest
        type: string
      enable_linux_smoke:
        description: Enable linux smoke/report plumbing lane
        required: false
        default: true
        type: boolean
      cross_compile:
        description: Enforce cross-compilation toolchain contract in runtime lanes
        required: false
        default: true
        type: boolean
  workflow_call:
    inputs:
      pr_number:
        description: Pull request number in the caller repository
        required: true
        type: string
      fetch_depth:
        description: Depth used when fetching pull/<pr>/head
        required: false
        default: '20'
        type: string
      max_pairs:
        description: Maximum commit pairs per VI (0 = all)
        required: false
        default: '6'
        type: string
      max_targets:
        description: Maximum changed VI targets processed per run (0 = all)
        required: false
        default: '60'
        type: string
      compare_modes:
        description: Optional comma/semicolon/newline separated mode list
        required: false
        default: ''
        type: string
      include_merge_parents:
        description: Include merge-parent lineage while walking history
        required: false
        default: false
        type: boolean
      results_root:
        description: Root directory for generated history artifacts
        required: false
        default: tests/results/pr-vi-history
        type: string
      upload_artifact:
        description: Upload generated history artifacts
        required: false
        default: true
        type: boolean
      post_comment:
        description: Post markdown summary as a PR comment
        required: false
        default: false
        type: boolean
      note:
        description: Optional note appended to PR comment output
        required: false
        default: ''
        type: string
      windows_image:
        description: NI windows container image used for compare lane
        required: false
        default: nationalinstruments/labview:2026q1-windows
        type: string
      linux_image:
        description: NI linux container image used for smoke lane
        required: false
        default: nationalinstruments/labview:latest-linux
        type: string
      windows_runner:
        description: Hosted runner label for windows compare lane
        required: false
        default: windows-2022
        type: string
      linux_runner:
        description: Hosted runner label for linux smoke lane
        required: false
        default: ubuntu-latest
        type: string
      enable_linux_smoke:
        description: Enable linux smoke/report plumbing lane
        required: false
        default: true
        type: boolean
      cross_compile:
        description: Enforce cross-compilation toolchain contract in runtime lanes
        required: false
        default: true
        type: boolean
    outputs:
      summary_path:
        description: Absolute path to pr-vi-history-summary@v1 json
        value: ${{ jobs.finalize.outputs.summary_path }}
      results_root:
        description: Absolute path to artifact root
        value: ${{ jobs.finalize.outputs.results_root }}
      manifest_path:
        description: Absolute path to vi-diff-manifest@v1 json
        value: ${{ jobs.finalize.outputs.manifest_path }}
      pair_count:
        description: Manifest pair count
        value: ${{ jobs.finalize.outputs.pair_count }}
      target_count:
        description: Summarized target count
        value: ${{ jobs.finalize.outputs.target_count }}
      completed_count:
        description: Completed target count
        value: ${{ jobs.finalize.outputs.completed_count }}
      diff_count:
        description: Total diff count from summary markdown payload
        value: ${{ jobs.finalize.outputs.diff_count }}
      markdown_path:
        description: Absolute path to rendered markdown summary
        value: ${{ jobs.finalize.outputs.markdown_path }}
      artifact_name:
        description: Uploaded artifact name
        value: ${{ jobs.finalize.outputs.artifact_name }}
      windows_lane_status:
        description: Result status for the windows compare lane
        value: ${{ jobs.finalize.outputs.windows_lane_status }}
      linux_lane_status:
        description: Result status for the linux smoke lane
        value: ${{ jobs.finalize.outputs.linux_lane_status }}
      windows_capture_path:
        description: Absolute path to NI windows capture JSON when available
        value: ${{ jobs.finalize.outputs.windows_capture_path }}
      linux_smoke_summary_path:
        description: Absolute path to linux smoke summary JSON when available
        value: ${{ jobs.finalize.outputs.linux_smoke_summary_path }}
      toolchain_contract_path:
        description: Absolute path to runtime toolchain contract JSON
        value: ${{ jobs.finalize.outputs.toolchain_contract_path }}
      pair_total_count:
        description: Total changed VI count before max_targets truncation
        value: ${{ jobs.finalize.outputs.pair_total_count }}
      pair_truncated:
        description: True when pair_count is truncated by max_targets
        value: ${{ jobs.finalize.outputs.pair_truncated }}

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: pr-vi-history-${{ github.repository }}-${{ inputs.pr_number }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Prepare PR metadata and manifest
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      pr_number: ${{ steps.prepare.outputs.pr_number }}
      pr_url: ${{ steps.prepare.outputs.pr_url }}
      base_sha: ${{ steps.prepare.outputs.base_sha }}
      head_sha: ${{ steps.prepare.outputs.head_sha }}
      manifest_path: ${{ steps.prepare.outputs.manifest_path }}
      pair_count: ${{ steps.prepare.outputs.pair_count }}
      pair_total_count: ${{ steps.prepare.outputs.pair_total_count }}
      results_root: ${{ steps.prepare.outputs.results_root }}
      artifact_name: ${{ steps.prepare.outputs.artifact_name }}
      manifest_artifact_name: ${{ steps.prepare.outputs.manifest_artifact_name }}
      node_version: ${{ steps.prepare.outputs.node_version }}
      windows_image: ${{ steps.prepare.outputs.windows_image }}
      linux_image: ${{ steps.prepare.outputs.linux_image }}
      toolchain_lock_path: ${{ steps.prepare.outputs.toolchain_lock_path }}
      windows_image_digest: ${{ steps.prepare.outputs.windows_image_digest }}
      linux_image_digest: ${{ steps.prepare.outputs.linux_image_digest }}
      tools_repository: ${{ steps.source.outputs.tools_repository }}
      tools_ref: ${{ steps.source.outputs.tools_ref }}
    steps:
      - name: Validate windows runner policy input
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! "${{ inputs.windows_runner }}" =~ ^windows- ]]; then
            echo "windows_runner must start with 'windows-' to satisfy Windows host invariant." >&2
            exit 1
          fi

      - name: Resolve workflow source repository
        id: source
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'
          $workflowRef = $env:GITHUB_WORKFLOW_REF
          if ([string]::IsNullOrWhiteSpace($workflowRef)) {
            throw 'GITHUB_WORKFLOW_REF is empty; cannot resolve workflow source repository.'
          }
          if ($workflowRef -notmatch '^(?<repo>[^@]+?)/\.github/workflows/[^@]+@(?<ref>.+)$') {
            throw ("Unable to parse workflow source from GITHUB_WORKFLOW_REF: {0}" -f $workflowRef)
          }
          Add-Content -LiteralPath $env:GITHUB_OUTPUT -Value ("tools_repository={0}" -f $Matches.repo) -Encoding utf8
          Add-Content -LiteralPath $env:GITHUB_OUTPUT -Value ("tools_ref={0}" -f $Matches.ref) -Encoding utf8

      - name: Checkout caller repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Checkout workflow toolchain
        uses: actions/checkout@v5
        with:
          repository: ${{ steps.source.outputs.tools_repository }}
          ref: ${{ steps.source.outputs.tools_ref }}
          path: .pr-vi-history-tools
          fetch-depth: 1

      - name: Prepare metadata and manifest
        id: prepare
        uses: ./.pr-vi-history-tools/.github/actions/pr-vi-history-prepare
        env:
          GH_TOKEN: ${{ github.token }}
        with:
          pr_number: ${{ inputs.pr_number }}
          fetch_depth: ${{ inputs.fetch_depth || '20' }}
          max_targets: ${{ inputs.max_targets || '60' }}
          results_root: ${{ inputs.results_root || 'tests/results/pr-vi-history' }}
          toolchain_lock_path: .pr-vi-history-tools/toolchain-lock.json
          windows_image: ${{ inputs.windows_image || 'nationalinstruments/labview:2026q1-windows' }}
          linux_image: ${{ inputs.linux_image || 'nationalinstruments/labview:latest-linux' }}

      - name: Upload prepare artifact
        uses: actions/upload-artifact@v5
        with:
          name: ${{ steps.prepare.outputs.manifest_artifact_name }}
          path: ${{ steps.prepare.outputs.manifest_path }}
          if-no-files-found: error

  history_windows_container:
    name: History compare (windows container)
    needs: prepare
    runs-on: ${{ inputs.windows_runner }}
    timeout-minutes: 30
    outputs:
      summary_path: ${{ steps.compare.outputs.summary_path }}
      results_root: ${{ steps.compare.outputs.results_root }}
      manifest_path: ${{ steps.compare.outputs.manifest_path }}
      target_count: ${{ steps.compare.outputs.target_count || '0' }}
      completed_count: ${{ steps.compare.outputs.completed_count || '0' }}
      diff_count: ${{ steps.compare.outputs.diff_count || '0' }}
      markdown_path: ${{ steps.compare.outputs.markdown_path }}
      markdown: ${{ steps.compare.outputs.markdown }}
      windows_capture_path: ${{ steps.compare.outputs.windows_capture_path }}
      toolchain_contract_path: ${{ steps.compare.outputs.toolchain_contract_path }}
      lane_status: ${{ steps.lane.outputs.status }}
    steps:
      - name: Checkout caller repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Checkout workflow toolchain
        uses: actions/checkout@v5
        with:
          repository: ${{ needs.prepare.outputs.tools_repository }}
          ref: ${{ needs.prepare.outputs.tools_ref }}
          path: .pr-vi-history-tools
          fetch-depth: 1

      - name: Download prepare artifact
        uses: actions/download-artifact@v5
        with:
          name: ${{ needs.prepare.outputs.manifest_artifact_name }}
          path: ${{ runner.temp }}/pr-vi-history-prepare

      - name: Locate manifest path
        id: manifest
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'
          $manifest = Get-ChildItem -LiteralPath (Join-Path $env:RUNNER_TEMP 'pr-vi-history-prepare') -Recurse -Filter 'vi-history-manifest.json' | Select-Object -First 1
          if (-not $manifest) {
            throw 'Unable to locate vi-history-manifest.json from prepare artifact.'
          }
          Add-Content -LiteralPath $env:GITHUB_OUTPUT -Value ("manifest_path={0}" -f $manifest.FullName) -Encoding utf8

      - name: Setup Node
        if: ${{ inputs.cross_compile == true || inputs.cross_compile == 'true' }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ needs.prepare.outputs.node_version }}

      - name: Run windows compare action
        id: compare
        uses: ./.pr-vi-history-tools/.github/actions/pr-vi-history-compare-windows
        with:
          manifest_path: ${{ steps.manifest.outputs.manifest_path }}
          results_root: ${{ needs.prepare.outputs.results_root }}
          max_pairs: ${{ inputs.max_pairs }}
          compare_modes: ${{ inputs.compare_modes }}
          include_merge_parents: ${{ inputs.include_merge_parents }}
          windows_image: ${{ needs.prepare.outputs.windows_image }}
          cross_compile: ${{ inputs.cross_compile }}
          toolchain_lock_path: ${{ needs.prepare.outputs.toolchain_lock_path }}

      - name: Upload history artifacts
        if: ${{ always() && (inputs.upload_artifact == '' || inputs.upload_artifact == true || inputs.upload_artifact == 'true') }}
        uses: actions/upload-artifact@v5
        with:
          name: ${{ needs.prepare.outputs.artifact_name }}
          path: |
            ${{ needs.prepare.outputs.results_root }}/**
          if-no-files-found: warn

      - name: Resolve windows lane status
        id: lane
        if: ${{ always() }}
        shell: pwsh
        env:
          JOB_STATUS: ${{ job.status }}
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'
          $status = if ([string]::Equals($env:JOB_STATUS, 'success', [System.StringComparison]::OrdinalIgnoreCase)) { 'success' } else { 'failure' }
          Add-Content -LiteralPath $env:GITHUB_OUTPUT -Value ("status={0}" -f $status) -Encoding utf8

  history_linux_smoke:
    name: History/report plumbing smoke (linux)
    needs: prepare
    if: ${{ inputs.enable_linux_smoke == true || inputs.enable_linux_smoke == 'true' }}
    runs-on: ${{ inputs.linux_runner }}
    timeout-minutes: 20
    continue-on-error: true
    outputs:
      history_report_md: ${{ steps.smoke.outputs.history_report_md }}
      history_report_html: ${{ steps.smoke.outputs.history_report_html }}
      smoke_summary_path: ${{ steps.smoke.outputs.smoke_summary_path }}
      lane_status: ${{ steps.lane.outputs.status }}
      toolchain_contract_path: ${{ steps.smoke.outputs.toolchain_contract_path }}
    steps:
      - name: Checkout caller repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Checkout workflow toolchain
        uses: actions/checkout@v5
        with:
          repository: ${{ needs.prepare.outputs.tools_repository }}
          ref: ${{ needs.prepare.outputs.tools_ref }}
          path: .pr-vi-history-tools
          fetch-depth: 1

      - name: Setup Node
        if: ${{ inputs.cross_compile == true || inputs.cross_compile == 'true' }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ needs.prepare.outputs.node_version }}

      - name: Run linux smoke action
        id: smoke
        uses: ./.pr-vi-history-tools/.github/actions/pr-vi-history-smoke-linux
        with:
          linux_image: ${{ needs.prepare.outputs.linux_image }}
          results_root: ${{ needs.prepare.outputs.results_root }}
          toolchain_lock_path: ${{ needs.prepare.outputs.toolchain_lock_path }}
          cross_compile: ${{ inputs.cross_compile }}
          emit_html: true

      - name: Upload linux smoke artifacts
        if: ${{ always() && (inputs.upload_artifact == '' || inputs.upload_artifact == true || inputs.upload_artifact == 'true') }}
        uses: actions/upload-artifact@v5
        with:
          name: vi-history-linux-smoke-${{ needs.prepare.outputs.pr_number }}
          path: |
            ${{ needs.prepare.outputs.results_root }}/**
          if-no-files-found: warn

      - name: Resolve linux lane status
        id: lane
        if: ${{ always() }}
        shell: pwsh
        env:
          JOB_STATUS: ${{ job.status }}
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'
          $status = if ([string]::Equals($env:JOB_STATUS, 'success', [System.StringComparison]::OrdinalIgnoreCase)) { 'success' } else { 'failure' }
          Add-Content -LiteralPath $env:GITHUB_OUTPUT -Value ("status={0}" -f $status) -Encoding utf8

  finalize:
    name: Finalize PR VI history
    needs: [prepare, history_windows_container, history_linux_smoke]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      summary_path: ${{ steps.finalize.outputs.summary_path }}
      results_root: ${{ steps.finalize.outputs.results_root }}
      manifest_path: ${{ steps.finalize.outputs.manifest_path }}
      pair_count: ${{ steps.finalize.outputs.pair_count }}
      pair_total_count: ${{ steps.finalize.outputs.pair_total_count }}
      pair_truncated: ${{ steps.finalize.outputs.pair_truncated }}
      target_count: ${{ steps.finalize.outputs.target_count }}
      completed_count: ${{ steps.finalize.outputs.completed_count }}
      diff_count: ${{ steps.finalize.outputs.diff_count }}
      markdown_path: ${{ steps.finalize.outputs.markdown_path }}
      artifact_name: ${{ steps.finalize.outputs.artifact_name }}
      windows_lane_status: ${{ steps.finalize.outputs.windows_lane_status }}
      linux_lane_status: ${{ steps.finalize.outputs.linux_lane_status }}
      windows_capture_path: ${{ steps.finalize.outputs.windows_capture_path }}
      linux_smoke_summary_path: ${{ steps.finalize.outputs.linux_smoke_summary_path }}
      toolchain_contract_path: ${{ steps.finalize.outputs.toolchain_contract_path }}
    steps:
      - name: Checkout workflow toolchain
        uses: actions/checkout@v5
        with:
          repository: ${{ needs.prepare.outputs.tools_repository }}
          ref: ${{ needs.prepare.outputs.tools_ref }}
          path: .pr-vi-history-tools
          fetch-depth: 1

      - name: Normalize outputs and enforce gates
        id: finalize
        uses: ./.pr-vi-history-tools/.github/actions/pr-vi-history-finalize
        with:
          pair_count: ${{ needs.prepare.outputs.pair_count }}
          pair_total_count: ${{ needs.prepare.outputs.pair_total_count }}
          summary_path: ${{ needs.history_windows_container.outputs.summary_path }}
          manifest_path: ${{ needs.history_windows_container.outputs.manifest_path || needs.prepare.outputs.manifest_path }}
          results_root: ${{ needs.history_windows_container.outputs.results_root || needs.prepare.outputs.results_root }}
          target_count: ${{ needs.history_windows_container.outputs.target_count || '0' }}
          completed_count: ${{ needs.history_windows_container.outputs.completed_count || '0' }}
          diff_count: ${{ needs.history_windows_container.outputs.diff_count || '0' }}
          markdown_path: ${{ needs.history_windows_container.outputs.markdown_path }}
          artifact_name: ${{ needs.prepare.outputs.artifact_name }}
          windows_lane_status: ${{ needs.history_windows_container.outputs.lane_status || needs.history_windows_container.result }}
          linux_lane_status: ${{ needs.history_linux_smoke.outputs.lane_status || needs.history_linux_smoke.result }}
          windows_capture_path: ${{ needs.history_windows_container.outputs.windows_capture_path }}
          linux_smoke_summary_path: ${{ needs.history_linux_smoke.outputs.smoke_summary_path }}
          toolchain_contract_path: ${{ needs.history_windows_container.outputs.toolchain_contract_path || needs.history_linux_smoke.outputs.toolchain_contract_path }}
          enable_linux_smoke: ${{ inputs.enable_linux_smoke }}

      - name: Post PR comment
        if: ${{ always() && (inputs.post_comment == true || inputs.post_comment == 'true') }}
        continue-on-error: true
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ needs.prepare.outputs.pr_number }}
          PR_URL: ${{ needs.prepare.outputs.pr_url }}
          WORKFLOW_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          WINDOWS_LANE_STATUS: ${{ steps.finalize.outputs.windows_lane_status }}
          LINUX_LANE_STATUS: ${{ steps.finalize.outputs.linux_lane_status }}
          PAIR_COUNT: ${{ steps.finalize.outputs.pair_count }}
          PAIR_TOTAL_COUNT: ${{ steps.finalize.outputs.pair_total_count }}
          PAIR_TRUNCATED: ${{ steps.finalize.outputs.pair_truncated }}
          MARKDOWN_ENCODED: ${{ needs.history_windows_container.outputs.markdown }}
          NOTE: ${{ inputs.note }}
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'
          $pairCount = 0
          [void][int]::TryParse(($env:PAIR_COUNT ?? '0'), [ref]$pairCount)
          $pairTotalCount = $pairCount
          [void][int]::TryParse(($env:PAIR_TOTAL_COUNT ?? $pairCount), [ref]$pairTotalCount)
          $pairTruncated = [string]::Equals($env:PAIR_TRUNCATED, 'true', [System.StringComparison]::OrdinalIgnoreCase)

          $bodyLines = [System.Collections.Generic.List[string]]::new()
          $bodyLines.Add('### VI history compare') | Out-Null
          $bodyLines.Add('') | Out-Null
          $bodyLines.Add(('- Pull request: #{0}' -f $env:PR_NUMBER)) | Out-Null
          $bodyLines.Add(('- Windows lane: **{0}**' -f $env:WINDOWS_LANE_STATUS)) | Out-Null
          $bodyLines.Add(('- Linux smoke lane: **{0}**' -f $env:LINUX_LANE_STATUS)) | Out-Null

          $markdown = $null
          if ($env:MARKDOWN_ENCODED) {
            $markdown = ($env:MARKDOWN_ENCODED -replace '%0A', "`n" -replace '%0D', "`r" -replace '%25', '%')
          }

          if ($pairCount -le 0) {
            $bodyLines.Add('No changed `.vi` entries were detected for this pull request.') | Out-Null
          } elseif ($markdown) {
            $bodyLines.Add(('- Changed VI pairs: **{0}**' -f $pairCount)) | Out-Null
            if ($pairTruncated -and $pairTotalCount -gt $pairCount) {
              $bodyLines.Add(('- Scope: first **{0}** of **{1}** changed VIs (`max_targets` cap).' -f $pairCount, $pairTotalCount)) | Out-Null
            }
            $bodyLines.Add('') | Out-Null
            $bodyLines.Add($markdown) | Out-Null
          }

          if (-not [string]::IsNullOrWhiteSpace($env:NOTE)) {
            $bodyLines.Add('') | Out-Null
            $bodyLines.Add(('> NOTE - {0}' -f $env:NOTE)) | Out-Null
          }

          if (-not [string]::IsNullOrWhiteSpace($env:PR_URL)) {
            $bodyLines.Add('') | Out-Null
            $bodyLines.Add(('PR URL: {0}' -f $env:PR_URL)) | Out-Null
          }
          $bodyLines.Add(('Run details: [link]({0}).' -f $env:WORKFLOW_URL)) | Out-Null

          $body = $bodyLines -join [Environment]::NewLine
          gh pr comment $env:PR_NUMBER --repo $env:GITHUB_REPOSITORY --body $body
