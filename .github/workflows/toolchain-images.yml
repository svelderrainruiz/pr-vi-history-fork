name: Build PR VI History Toolchain Images

on:
  workflow_dispatch:
    inputs:
      push_images:
        description: Push built images to GHCR
        required: false
        default: false
        type: boolean
      windows_base:
        description: Windows NI base image tag
        required: false
        default: nationalinstruments/labview:2026q1-windows
        type: string
      linux_base:
        description: Linux NI base image tag
        required: false
        default: nationalinstruments/labview:latest-linux
        type: string
      node_version:
        description: Node version to bake into derived images
        required: false
        default: '22.11.0'
        type: string

permissions:
  contents: read
  packages: write

jobs:
  linux-image:
    name: Build linux derived image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Login to GHCR
        if: ${{ inputs.push_images == true || inputs.push_images == 'true' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build linux image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: containers/linux-node/Dockerfile
          push: ${{ inputs.push_images == true || inputs.push_images == 'true' }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/pr-vi-history-ni-linux-node:latest-node22
          build-args: |
            BASE_IMAGE=${{ inputs.linux_base }}
            NODE_VERSION=${{ inputs.node_version }}

  windows-image:
    name: Build windows derived image
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Verify Docker Windows mode
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'
          $osType = (& docker info --format '{{.OSType}}' 2>$null).Trim().ToLowerInvariant()
          if ($osType -ne 'windows') {
            throw ("Docker daemon must run in windows mode. Current OSType={0}" -f $osType)
          }

      - name: Login to GHCR
        if: ${{ inputs.push_images == true || inputs.push_images == 'true' }}
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'
          '${{ github.token }}' | docker login ghcr.io --username '${{ github.actor }}' --password-stdin

      - name: Build windows image
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'

          $tag = 'ghcr.io/${{ github.repository_owner }}/pr-vi-history-ni-windows-node:2026q1-node22'
          docker build `
            --file containers/windows-node/Dockerfile `
            --build-arg BASE_IMAGE='${{ inputs.windows_base }}' `
            --build-arg NODE_VERSION='${{ inputs.node_version }}' `
            --tag $tag `
            .

          if ([string]::Equals('${{ inputs.push_images }}', 'true', [System.StringComparison]::OrdinalIgnoreCase)) {
            docker push $tag
          }
